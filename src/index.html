<!doctype html>
<html lang="sv" data-theme="synthwave">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TjenaMors.se</title>
    <link rel="stylesheet" href="build/assets/base.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css" />
  </head>
  <body class="font-sans antialiased overflow-hidden">
    <div class="relative h-screen overflow-hidden" style="font-size: min(16px, 2.8vmin, 1.8vh);">
      <div class="relative mx-auto w-full h-full city overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 sun"></div>
      </div>

      <div class="player">
        <div id="disc" class="sun"></div>
        <div class="player-content">
          <div class="text-center info-text info info-shadow">
            <div id="song-text" class="tracking-wide leading-tight truncate">TjenaMors Radio</div>
            <span id="artist"
              class="block tracking-wider truncate">Vi spelar bra skit!</span>
          </div>
          <div class="controls">
            <button id="play-pause" class="btn" disabled><i class="fa-solid fa-play"></i></button>
            <button id="live-btn" class="btn live">LIVE</button>
          </div>
          <div class="timeline-wrap">
            <div class="progress"><div id="progress-fill"></div></div>
          </div>
          <div id="time" class="tracking-widest"></div>
        </div>
      </div>

      <div class="grid-container">
        <div class="synth-grid"></div>
      </div>
    </div>

    <audio id="radio" preload="metadata" autoplay playsinline muted></audio>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
