<!doctype html>
<html lang="sv" data-theme="synthwave">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TjenaMors.se</title>

    <link rel="stylesheet" href="build/assets/app-70c7238d.css" />

    <style>
      .logo-text {
        font-family: "Audiowide", sans-serif;
        text-transform: uppercase;
        background: linear-gradient(
          to bottom,
          rgba(111, 111, 255) 33%,
          rgba(155, 155, 100, 1) 40%,
          rgba(200, 200, 111, 1) 50%,
          rgba(200, 200, 180, 1) 65%,
          rgba(200, 200, 255, 1) 80%
        );
        -webkit-background-clip: text;
        -moz-background-clip: text;
        -webkit-text-fill-color: transparent;
        -moz-text-fill-color: transparent;
      }

      .grid-container {
        width: 100%;
        height: 100vh;
        opacity: 0.7;
        position: absolute;
        bottom: 0;
        left: 0;
        pointer-events: none;
      }

      .synth-grid {
        position: relative;
        -webkit-backdrop-filter: blur(50%);
        backdrop-filter: blur(50%);
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0),
          hsl(var(--p)) 66%,
          hsl(var(--p))
        );
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0),
          hsl(var(--p)) 66%,
          hsl(var(--p))
        );
        background:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0) 0px,
            rgba(54, 226, 248, 0.5) 0%,
            rgba(54, 226, 248, 0.5) 3px,
            rgba(0, 0, 0, 0) 0px
          ),
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0) 0px,
            rgba(54, 226, 248, 0.5) 0%,
            rgba(54, 226, 248, 0.5) 3px,
            rgba(0, 0, 0, 0) 0px
          );
        background-size:
          2em 2em,
          2em 2em;
        height: 35em;
        perspective: 1000px;
        margin-top: 30em;
        transform: perspective(600px) rotateX(60deg) scale(3);
        animation: flyForward 4s linear infinite;
      }

      .synth-grid:before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 100%;
        background: linear-gradient(rgba(0, 0, 0, 0), hsl(var(--p)));
        pointer-events: none;
      }

      @keyframes flyForward {
        0% {
          background-position:
            0% 0%,
            0% 0%;
        }
        100% {
          background-position:
            0% 100%,
            0% 100%;
        }
      }

      .city {
        position: absolute;
        margin-top: 1em;
        height: 30em;
        animation: rising_city 1s ease-out forwards;
      }

      .sun {
        background: linear-gradient(
          to bottom,
          rgba(255, 211, 25, 1) 0%,
          rgba(255, 211, 25, 1) 35.5%,
          rgba(255, 211, 25, 0) 35.6%,
          rgba(255, 211, 25, 0) 36.6%,
          rgba(255, 177, 27, 1) 36.5%,
          rgba(255, 177, 27, 1) 43.5%,
          rgba(255, 177, 27, 0) 43.6%,
          rgba(255, 177, 27, 0) 44.6%,
          rgba(255, 144, 31, 1) 44.7%,
          rgba(255, 144, 31, 1) 50%,
          rgba(255, 144, 31, 0) 50.1%,
          rgba(255, 144, 31, 0) 51.1%,
          rgba(255, 92, 74, 1) 51.2%,
          rgba(255, 92, 74, 1) 58.2%,
          rgba(255, 92, 74, 0) 58.3%,
          rgba(255, 92, 74, 0) 59.3%,
          rgba(255, 41, 117, 1) 59.4%,
          rgba(255, 41, 117, 1) 66.4%,
          rgba(255, 41, 117, 0) 66.5%,
          rgba(255, 41, 117, 0) 67.5%,
          rgba(249, 38, 186, 1) 67.6%,
          rgba(249, 38, 186, 1) 74.6%,
          rgba(249, 38, 186, 0) 74.7%,
          rgba(249, 38, 186, 0) 75.7%,
          rgba(242, 34, 255, 1) 75.8%,
          rgba(242, 34, 255, 1) 82.8%,
          rgba(242, 34, 255, 0) 82.9%,
          rgba(242, 34, 255, 0) 83.9%,
          rgba(242, 34, 255, 1) 84%,
          rgba(242, 34, 255, 1) 91%,
          rgba(242, 34, 255, 0) 91.1%,
          rgba(242, 34, 255, 0) 92.1%,
          rgba(191, 32, 255, 1) 92.2%,
          rgba(191, 32, 255, 1) 96.2%,
          rgba(191, 32, 255, 0) 96.3%,
          rgba(191, 32, 255, 0) 96.8%,
          rgba(140, 30, 255, 1) 97.7%
        );
        border-radius: 100%;
        width: 30em;
        height: 30em;
        filter: drop-shadow(1em 0 0.5em #ff0d77af);
      }

      @keyframes rising_city {
        0% {
          height: 1em;
          margin-top: 30em;
        }
        100% {
          height: 35em;
          margin-top: -4em;
        }
      }

      .player {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25em;
        pointer-events: none;
        width: min(92vw, 40em);
      }
      .player > * {
        pointer-events: auto;
      }

      #disc {
        width: 26em;
        height: 26em;
        background-size: cover;
        background-position: center;
        box-shadow: 0 0 3em #ff0d7760;
        transition:
          background-image 0.4s ease,
          box-shadow 0.4s ease;
      }
      #disc.has-art {
        border: 2px solid rgba(54, 226, 248, 0.6);
        box-shadow:
          0 0 3em #ff0d7770,
          0 0 6em rgba(54, 226, 248, 0.25);
      }

      .info {
        text-align: center;
        font-family: "Audiowide", sans-serif;
        color: #ffe6fb;
        text-shadow:
          0 0 8px #ff0d77aa,
          0 0 2px #000;
        width: 100%;
      }
      #song-text {
        font-size: 1.15em;
        letter-spacing: 0.04em;
        line-height: 1.3;
      }
      #artist {
        display: block;
        color: #36e2f8;
        font-size: 0.8em;
        margin-top: 0.35em;
        letter-spacing: 0.06em;
      }

      .progress {
        width: 22em;
        max-width: 80vw;
        height: 4px;
        background: rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        overflow: hidden;
        margin: 0.8em auto 0;
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #36e2f8, #ff2e97);
        border-radius: 999px;
        transition: width 0.3s linear;
      }
      #time {
        font-size: 0.7em;
        color: #b8d8ff;
        margin-top: 0.45em;
        letter-spacing: 0.12em;
      }

      .controls {
        display: flex;
        gap: 0.9em;
        align-items: center;
        margin-top: 0.2em;
      }
      .btn {
        font-family: "Audiowide", sans-serif;
        background: rgba(10, 6, 30, 0.55);
        border: 1px solid rgba(255, 46, 151, 0.5);
        color: #ffe6fb;
        border-radius: 999px;
        padding: 0.55em 1.3em;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.85em;
        transition: all 0.2s ease;
        backdrop-filter: blur(4px);
      }
      .btn:hover {
        background: rgba(255, 46, 151, 0.28);
        box-shadow: 0 0 16px rgba(255, 46, 151, 0.5);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: default;
        box-shadow: none;
      }
      #play-pause {
        font-size: 1em;
        padding: 0.55em 1.6em;
      }

      #live-btn.live {
        border-color: #ff3b3b;
        color: #ff6a6a;
        box-shadow: 0 0 14px rgba(255, 59, 59, 0.6);
      }
      #live-btn.live::before {
        content: "● ";
        animation: livePulse 1.2s ease-in-out infinite;
      }
      @keyframes livePulse {
        50% {
          opacity: 0.35;
        }
      }

      #scrub {
        width: 22em;
        max-width: 80vw;
        accent-color: #ff2e97;
        cursor: pointer;
      }
    </style>
  </head>
  <body class="font-sans antialiased overflow-hidden">
    <div class="relative h-screen overflow-hidden pt-16">
      <div class="relative mx-auto w-full h-full city overflow-hidden pt-8">
        <div
          class="sticky top-1/2 left-1/2 -translate-x-1/2 h-full w-full sun"
        ></div>
      </div>

      <div class="player">
        <div id="disc" class="sun"></div>
        <div class="info">
          <div id="song-text">TjenaMors Radio</div>
          <span id="artist">Vi spelar bra skit!</span>
          <div class="progress"><div id="progress-fill"></div></div>
          <div id="time"></div>
        </div>
        <div class="controls">
          <button id="play-pause" class="btn" disabled>▶</button>
          <button id="live-btn" class="btn live">LIVE</button>
        </div>
        <input id="scrub" type="range" disabled />
      </div>

      <div class="grid-container">
        <div class="synth-grid"></div>
      </div>
    </div>

    <audio id="radio" preload="none"></audio>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <script>
      const API = 'https://radio.tjenamors.se/api/nowplaying/1';
      const STREAM = 'https://radio.tjenamors.se/listen/tjenamors_radio/live.m3u8';

      const audio = document.getElementById('radio');
      const disc = document.getElementById('disc');
      const songText = document.getElementById('song-text');
      const artistEl = document.getElementById('artist');
      const progressFill = document.getElementById('progress-fill');
      const timeLabel = document.getElementById('time');
      const playPause = document.getElementById('play-pause');
      const liveBtn = document.getElementById('live-btn');
      const scrub = document.getElementById('scrub');

      let timeline = [];
      let hls = null;
      let liveWall = Date.now() / 1000;
      let scrubbing = false;
      let currentArt = '';
      let isOnline = false;
      let recoverTimer = null;

      function normalize(np) {
        if (!np || !np.song) return null;
        if (!np.played_at || !np.duration) return null;
        return {
          played_at: np.played_at,
          duration: np.duration || 0,
          art: np.song.art || null,
          title: np.song.title || '',
          artist: np.song.artist || '',
          text: np.song.text || '',
        };
      }

      async function pollNowPlaying() {
        try {
          const res = await fetch(API);
          const data = await res.json();
          isOnline = !!data.is_online;
          const songs = [];
          (data.song_history || []).slice().reverse().forEach((h) => {
            const s = normalize(h);
            if (s) songs.push(s);
          });
          const now = normalize(data.now_playing);
          if (now) songs.push(now);
          const next = normalize(data.playing_next);
          if (next) songs.push(next);
          const seen = new Set();
          timeline = songs
            .filter((s) => {
              if (seen.has(s.played_at)) return false;
              seen.add(s.played_at);
              return true;
            })
            .sort((a, b) => a.played_at - b.played_at);
        } catch (e) {
          console.error('nowplaying fetch failed', e);
        }
      }

      function setupHls() {
        if (audio.canPlayType('application/vnd.apple.mpegurl')) {
          audio.src = STREAM;
          audio.addEventListener('loadedmetadata', onReady);
          audio.addEventListener('error', scheduleRecover);
        } else if (window.Hls && Hls.isSupported()) {
          hls = new Hls({ lowLatencyMode: true, enableWorker: true });
          hls.loadSource(STREAM);
          hls.attachMedia(audio);
          hls.on(Hls.Events.MANIFEST_PARSED, onReady);
          hls.on(Hls.Events.ERROR, (_e, data) => {
            if (data.fatal) scheduleRecover();
          });
        } else {
          songText.textContent = 'HLS not supported';
        }
      }

      function scheduleRecover() {
        if (recoverTimer) return;
        recoverTimer = setTimeout(() => {
          recoverTimer = null;
          if (hls) {
            try {
              hls.destroy();
            } catch (_) {}
            hls = null;
          }
          setupHls();
          goLive();
        }, 3000);
      }

      function onReady() {
        playPause.disabled = false;
        scrub.disabled = false;
      }

      function liveEdgeMedia() {
        if (hls && hls.liveSyncPosition) return hls.liveSyncPosition;
        if (audio.seekable.length) return audio.seekable.end(audio.seekable.length - 1);
        return 0;
      }

      function mediaToWall(mediaTime) {
        return liveWall - (liveEdgeMedia() - mediaTime);
      }

      function findSongAt(wc) {
        return timeline.find((s) => wc >= s.played_at && wc < s.played_at + s.duration);
      }

      function isAtLive() {
        return liveEdgeMedia() - audio.currentTime < 3;
      }

      function setArt(url) {
        if (url === currentArt) return;
        currentArt = url || '';
        if (url) {
          disc.style.backgroundImage = `url("${url}")`;
          disc.classList.add('has-art');
        } else {
          disc.style.backgroundImage = '';
          disc.classList.remove('has-art');
        }
      }

      function fmt(s) {
        s = Math.max(0, s | 0);
        const m = (s / 60) | 0;
        const r = s % 60;
        return m + ':' + String(r).padStart(2, '0');
      }

      function render() {
        if (!isOnline) {
          setArt(null);
          songText.textContent = 'Ingen sändning';
          artistEl.textContent = '';
          progressFill.style.width = '0%';
          timeLabel.textContent = '';
          liveBtn.classList.remove('live');
          return;
        }
        const wc = mediaToWall(audio.currentTime);
        const song = findSongAt(wc);
        if (song) {
          setArt(song.art);
          songText.textContent = song.title || song.text;
          artistEl.textContent = song.artist || '';
          const pos = wc - song.played_at;
          const pct = song.duration ? Math.min(100, (pos / song.duration) * 100) : 0;
          progressFill.style.width = pct + '%';
          timeLabel.textContent = fmt(pos) + ' / ' + fmt(song.duration);
        } else {
          setArt(null);
          songText.textContent = 'TjenaMors Radio';
          artistEl.textContent = 'Vi spelar bra skit!';
          progressFill.style.width = '0%';
          timeLabel.textContent = '';
        }

        if (audio.seekable.length) {
          const start = audio.seekable.start(0);
          const end = liveEdgeMedia();
          scrub.min = start;
          scrub.max = end;
          if (!scrubbing) scrub.value = audio.currentTime;
        }
        liveBtn.classList.toggle('live', isAtLive());
      }

      playPause.addEventListener('click', () => {
        if (audio.paused) {
          if (isAtLive() || !audio.seekable.length) goLive();
          audio.play().catch((e) => console.error(e));
        } else {
          audio.pause();
        }
      });

      liveBtn.addEventListener('click', goLive);

      function goLive() {
        const live = liveEdgeMedia();
        if (live) audio.currentTime = live;
        liveWall = Date.now() / 1000;
        audio.play().catch(() => {});
      }

      scrub.addEventListener('input', () => {
        scrubbing = true;
        audio.currentTime = parseFloat(scrub.value);
      });
      scrub.addEventListener('change', () => {
        scrubbing = false;
      });

      audio.addEventListener('timeupdate', render);
      audio.addEventListener('play', () => {
        playPause.textContent = '❚❚';
      });
      audio.addEventListener('pause', () => {
        playPause.textContent = '▶';
      });
      audio.addEventListener('waiting', () => {
        if (!audio.paused) scheduleRecover();
      });

      setInterval(() => {
        if (isAtLive()) liveWall = Date.now() / 1000;
      }, 1000);

      pollNowPlaying();
      setInterval(pollNowPlaying, 10000);
      setupHls();
      render();
    </script>
  </body>
</html>
