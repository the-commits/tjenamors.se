    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <meta name="twitter:card" content="summary" />

    <meta name="twitter:image" content="https://tjenamors.se/favicon-32x32.png" />
    <script type="application/ld+json" id="seo-schema">
    {
      "@context": "https://schema.org",
      "@type": "RadioStation",
      "name": "TjenaMors.se",
      "url": "https://tjenamors.se",
      "description": "Rebelradio för punk, ska, rock, metal och annat rebelliskt oväsen. Vi spelar bra skit — när vi kommer ihåg det.",
      "slogan": "Vi spelar bra skit!",
      "genre": ["Punk", "Ska", "Rock", "Metal", "Rebellious"],
      "areaServed": "SE",
      "inLanguage": "sv",
      "foundingDate": "2024",
      "sameAs": ["https://tjenamors.se"],
      "potentialAction": {
        "@type": "ListenAction",
        "target": {
          "@type": "EntryPoint",
          "url": "https://tjenamors.se",
          "actionPlatform": [
            "http://schema.org/DesktopWebPlatform",
            "http://schema.org/MobileWebPlatform"
          ]
        },
        "expectsAcceptanceOf": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "SEK",
          "availability": "http://schema.org/InStock"
        }
      }
    }
    </script>
  </head>
  <body class="font-sans antialiased overflow-hidden">
    <div class="relative h-screen overflow-hidden" style="font-size: min(16px, 2.8vmin, 1.8vh);">
      <div class="relative mx-auto w-full h-full city overflow-hidden">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 sun"></div>
      </div>

      <div class="player">
        <div id="disc" class="sun"></div>
        <div class="player-content">
          <div class="text-center info-text info info-shadow">
            <div id="song-text" class="tracking-wide leading-tight truncate">TjenaMors Radio</div>
            <span id="artist"
              class="block tracking-wider truncate">Vi spelar bra skit!</span>
          </div>
          <div class="controls">
            <button id="play-pause" class="btn" disabled><i class="fa-solid fa-play"></i></button>
            <button id="live-btn" class="btn live">LIVE</button>
          </div>
            <div class="volume-control">
              <i class="fa-solid fa-volume-high" id="volume-icon" role="button" tabindex="0"></i>
              <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
            </div>
            <div class="timeline-wrap">
              <div class="progress"><div id="progress-fill"></div></div>
            </div>
          <div id="time" class="tracking-widest"></div>
        </div>
      </div>

      <div class="grid-container">
        <div class="synth-grid"></div>
      </div>

      <div id="surf-tip" aria-live="polite">
        <a id="surf-tip-link" href="#" target="_blank" rel="noopener">
          <span id="surf-tip-text"></span>
        </a>
      </div>

      <div id="cookie-notice">
        🍪 Vi sparar volymen i en cookie. Vi rövknullar bara folk som vill och förtjänar det.🤘
      </div>
    </div>

    <audio id="radio" preload="metadata" autoplay playsinline muted></audio>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
