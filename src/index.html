<!doctype html>
<html lang="sv" data-theme="synthwave">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TjenaMors.se</title>

    <link rel="stylesheet" href="build/assets/base.css" />

    <style>
      .logo-text {
        font-family: "Audiowide", sans-serif;
        text-transform: uppercase;
        background: linear-gradient(
          to bottom,
          rgba(111, 111, 255) 33%,
          rgba(155, 155, 100, 1) 40%,
          rgba(200, 200, 111, 1) 50%,
          rgba(200, 200, 180, 1) 65%,
          rgba(200, 200, 255, 1) 80%
        );
        -webkit-background-clip: text;
        -moz-background-clip: text;
        -webkit-text-fill-color: transparent;
        -moz-text-fill-color: transparent;
      }

      .grid-container {
        width: 100%;
        height: 100vh;
        opacity: 0.7;
        position: absolute;
        bottom: 0;
        left: 0;
        pointer-events: none;
        transition: opacity 1.5s ease;
        animation: slideDown 4.6s ease-in 0.4s forwards;
      }

      @keyframes slideDown {
        to { transform: translateY(100vh); }
      }

      @media (prefers-reduced-motion: reduce) {
        .grid-container {
          animation: none;
        }
      }

      .synth-grid {
        position: relative;
        -webkit-backdrop-filter: blur(50%);
        backdrop-filter: blur(50%);
        -webkit-mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0),
          hsl(var(--p)) 66%,
          hsl(var(--p))
        );
        mask-image: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0),
          hsl(var(--p)) 66%,
          hsl(var(--p))
        );
        background:
          linear-gradient(
            180deg,
            rgba(0, 0, 0, 0) 0px,
            rgba(54, 226, 248, 0.5) 0%,
            rgba(54, 226, 248, 0.5) 3px,
            rgba(0, 0, 0, 0) 0px
          ),
          linear-gradient(
            90deg,
            rgba(0, 0, 0, 0) 0px,
            rgba(54, 226, 248, 0.5) 0%,
            rgba(54, 226, 248, 0.5) 3px,
            rgba(0, 0, 0, 0) 0px
          );
        background-size:
          2em 2em,
          2em 2em;
        height: 35em;
        perspective: 1000px;
        margin-top: 30em;
        transform: perspective(600px) rotateX(60deg) scale(3);
        animation: flyForward 4s linear infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        .synth-grid {
          animation: none;
        }
      }

      .synth-grid:before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 100%;
        background: linear-gradient(rgba(0, 0, 0, 0), hsl(var(--p)));
        pointer-events: none;
      }

      @keyframes flyForward {
        0% {
          background-position:
            0% 0%,
            0% 0%;
        }
        100% {
          background-position:
            0% 100%,
            0% 100%;
        }
      }

      .city {
        position: absolute;
        top: 2vh;
        height: 30em;
        animation: rising_city 1s ease-out forwards;
      }

      .sun {
        background: linear-gradient(
          to bottom,
          rgba(255, 211, 25, 1) 0%,
          rgba(255, 211, 25, 1) 35.5%,
          rgba(255, 211, 25, 0) 35.6%,
          rgba(255, 211, 25, 0) 36.6%,
          rgba(255, 177, 27, 1) 36.5%,
          rgba(255, 177, 27, 1) 43.5%,
          rgba(255, 177, 27, 0) 43.6%,
          rgba(255, 177, 27, 0) 44.6%,
          rgba(255, 144, 31, 1) 44.7%,
          rgba(255, 144, 31, 1) 50%,
          rgba(255, 144, 31, 0) 50.1%,
          rgba(255, 144, 31, 0) 51.1%,
          rgba(255, 92, 74, 1) 51.2%,
          rgba(255, 92, 74, 1) 58.2%,
          rgba(255, 92, 74, 0) 58.3%,
          rgba(255, 92, 74, 0) 59.3%,
          rgba(255, 41, 117, 1) 59.4%,
          rgba(255, 41, 117, 1) 66.4%,
          rgba(255, 41, 117, 0) 66.5%,
          rgba(255, 41, 117, 0) 67.5%,
          rgba(249, 38, 186, 1) 67.6%,
          rgba(249, 38, 186, 1) 74.6%,
          rgba(249, 38, 186, 0) 74.7%,
          rgba(249, 38, 186, 0) 75.7%,
          rgba(242, 34, 255, 1) 75.8%,
          rgba(242, 34, 255, 1) 82.8%,
          rgba(242, 34, 255, 0) 82.9%,
          rgba(242, 34, 255, 0) 83.9%,
          rgba(242, 34, 255, 1) 84%,
          rgba(242, 34, 255, 1) 91%,
          rgba(242, 34, 255, 0) 91.1%,
          rgba(242, 34, 255, 0) 92.1%,
          rgba(191, 32, 255, 1) 92.2%,
          rgba(191, 32, 255, 1) 96.2%,
          rgba(191, 32, 255, 0) 96.3%,
          rgba(191, 32, 255, 0) 96.8%,
          rgba(140, 30, 255, 1) 97.7%
        );
        border-radius: 100%;
        width: min(30em, 80vw);
        height: min(30em, 80vw);
        filter: drop-shadow(1em 0 0.5em #ff0d77af);
      }

      @keyframes rising_city {
        0% {
          height: 1em;
          top: 100%;
        }
        100% {
          height: 35em;
          top: 2vh;
        }
      }

      .player {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.25em;
        pointer-events: none;
        width: min(92vw, 40em);
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.9s ease;
      }
      .player.visible {
        opacity: 1;
        visibility: visible;
      }
      .player > * {
        pointer-events: auto;
      }

      .player-content {
        margin-top: 2.5em;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        gap: 1.5em;
      }

      #disc {
        width: min(26em, 70vw);
        height: min(26em, 70vw);
        background-size: cover;
        background-position: center;
        box-shadow: 0 0 3em #ff0d7760;
        transition:
          background-image 0.4s ease,
          box-shadow 0.4s ease;
      }
      #disc.has-art {
        border: 2px solid rgba(54, 226, 248, 0.6);
        box-shadow:
          0 0 3em #ff0d7770,
          0 0 6em rgba(54, 226, 248, 0.25);
      }

      .info {
        text-align: center;
        font-family: "Audiowide", sans-serif;
        color: #ffe6fb;
        text-shadow:
          0 0 8px #ff0d77aa,
          0 0 2px #000;
        width: 22em;
        max-width: 80vw;
      }
      #song-text {
        font-size: 1.15em;
        letter-spacing: 0.04em;
        line-height: 1.3;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      #artist {
        display: block;
        color: #36e2f8;
        font-size: 0.8em;
        margin-top: 0.35em;
        letter-spacing: 0.06em;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .timeline {
        position: relative;
        width: 22em;
        max-width: 80vw;
        margin: 0.8em auto 0;
      }
      .progress {
        width: 100%;
        height: 8px;
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        overflow: hidden;
        box-shadow: inset 0 0 4px rgba(0,0,0,0.3), 0 0 6px rgba(54, 226, 248, 0.15);
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #36e2f8, #ff2e97);
        border-radius: 999px;
        transition: width 0.3s linear;
      }
      #time {
        font-size: 0.7em;
        color: #b8d8ff;
        margin-top: 0.45em;
        letter-spacing: 0.12em;
      }

      .controls {
        display: flex;
        gap: 0.9em;
        justify-content: center;
        align-items: center;
      }
      .btn {
        font-family: "Audiowide", sans-serif;
        background: rgba(10, 6, 30, 0.55);
        border: 1px solid rgba(255, 46, 151, 0.5);
        color: #ffe6fb;
        border-radius: 999px;
        padding: 0.55em 1.3em;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.85em;
        min-height: auto;
        height: auto;
        transition: all 0.2s ease;
        backdrop-filter: blur(4px);
      }
      .btn:hover {
        background: rgba(255, 46, 151, 0.28);
        box-shadow: 0 0 16px rgba(255, 46, 151, 0.5);
      }
      .btn:disabled {
        opacity: 0.4;
        cursor: default;
        box-shadow: none;
      }
      #play-pause {
        font-size: 1em;
        padding: 0.55em 1.6em;
      }

      #live-btn.live {
        border-color: #ff3b3b;
        color: #ff6a6a;
        box-shadow: 0 0 14px rgba(255, 59, 59, 0.6);
      }
      #live-btn.live::before {
        content: "● ";
        animation: livePulse 1.2s ease-in-out infinite;
      }
      @keyframes livePulse {
        50% {
          opacity: 0.35;
        }
      }

      /* xxs: smartwatch / tiny viewport — merged play/live, no timeline */
      @media (max-width: 200px) {
        .player-content .progress,
        #time,
        #live-btn {
          display: none;
        }
        #play-pause:after {
          content: ' LIVE';
        }
        .info {
          font-size: 0.6em;
        }
      }
    </style>
  </head>
  <body class="font-sans antialiased overflow-hidden">
    <div class="relative h-screen overflow-hidden" style="font-size: min(16px, 2.8vmin, 1.8vh);">
      <div class="relative mx-auto w-full h-full city overflow-hidden">
        <div
          class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 sun"
        ></div>
      </div>

      <div class="player">
        <div id="disc" class="sun"></div>
        <div class="player-content">
          <div class="info">
            <div id="song-text">TjenaMors Radio</div>
            <span id="artist">Vi spelar bra skit!</span>
          </div>
          <div class="controls">
            <button id="play-pause" class="btn" disabled>▶</button>
            <button id="live-btn" class="btn live">LIVE</button>
          </div>
          <div class="timeline">
            <div class="progress"><div id="progress-fill"></div></div>
          </div>
          <div id="time"></div>
        </div>
      </div>

      <div class="grid-container">
        <div class="synth-grid"></div>
      </div>
    </div>

    <audio id="radio" preload="metadata" autoplay playsinline muted></audio>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    <script>
      const API = 'https://radio.tjenamors.se/api/nowplaying/1';
      const HLS_STREAM = 'https://radio.tjenamors.se/hls/tjenamors_radio/live.m3u8';
      const MP3_STREAM = 'https://radio.tjenamors.se/listen/tjenamors_radio/radio.mp3';

      const audio = document.getElementById('radio');
      const disc = document.getElementById('disc');
      const songText = document.getElementById('song-text');
      const artistEl = document.getElementById('artist');
      const progressFill = document.getElementById('progress-fill');
      const timeLabel = document.getElementById('time');
      const playPause = document.getElementById('play-pause');
      const liveBtn = document.getElementById('live-btn');

      let timeline = [];
      let nowPlayingSong = null;
      let hls = null;
      let liveWall = Date.now() / 1000;
      let scrubbing = false;
      let userSeeked = false;
      let lastUserPos = 0;
      let suppressSeekGuard = false;
      let currentArt = '';
      let isOnline = false;
      let recoverTimer = null;
      let mode = 'hls';
      let hlsFailCount = 0;
      let upgradeTimer = null;
      let audioPlaying = false;
      let nextUp = null;
      let localStart = 0;
      let localSongId = '';
      let lastFetch = 0;

      function normalize(np) {
        if (!np || !np.song) return null;
        if (!np.played_at || !np.duration) return null;
        return {
          played_at: np.played_at,
          duration: np.duration || 0,
          art: np.song.art || null,
          title: np.song.title || '',
          artist: np.song.artist || '',
          text: np.song.text || '',
          id: np.song.id || '',
        };
      }

      async function pollNowPlaying() {
        lastFetch = Date.now();
        try {
          const res = await fetch(API);
          const data = await res.json();
          isOnline = !!data.is_online;
          nextUp = normalize(data.playing_next);
          const songs = [];
          (data.song_history || []).slice().reverse().forEach((h) => {
            const s = normalize(h);
            if (s) songs.push(s);
          });
          const now = normalize(data.now_playing);
          nowPlayingSong = now;
          if (now) songs.push(now);
          const next = normalize(data.playing_next);
          if (next) songs.push(next);
          const seen = new Set();
          timeline = songs
            .filter((s) => {
              if (seen.has(s.played_at)) return false;
              seen.add(s.played_at);
              return true;
            })
            .sort((a, b) => a.played_at - b.played_at);
        } catch (e) {
          console.error('nowplaying fetch failed', e);
        }
      }

      function fetchNow() {
        const now = Date.now();
        if (now - lastFetch < 2000) return;
        lastFetch = now;
        pollNowPlaying();
      }

      function teardownHls() {
        if (hls) {
          try {
            hls.destroy();
          } catch (_) {}
          hls = null;
        }
        audio.removeEventListener('error', onAudioError);
        audio.removeAttribute('src');
        audio.load();
      }

      function setupHls() {
        mode = 'hls';
        if (audio.canPlayType('application/vnd.apple.mpegurl')) {
          audio.src = HLS_STREAM;
          audio.addEventListener('loadedmetadata', onReady);
          audio.addEventListener('error', onAudioError);
        } else if (window.Hls && Hls.isSupported()) {
          hls = new Hls({
            lowLatencyMode: false,
            enableWorker: true,
            maxBufferLength: 40,
            maxMaxBufferLength: 120,
            liveSyncDuration: 20,
            liveDurationInfinity: true,
            backBufferLength: 600,
            manifestLoadingMaxRetry: 4,
            levelLoadingTimeOut: 10000,
            maxFragLookUpTolerance: 2,
          });
          hls.loadSource(HLS_STREAM);
          hls.attachMedia(audio);
          hls.on(Hls.Events.MANIFEST_PARSED, onReady);
          hls.on(Hls.Events.ERROR, (_e, data) => {
            if (data.fatal) onHlsFatal(data);
          });
        } else {
          switchToMp3();
        }
      }

      function onHlsFatal(data) {
        hlsFailCount++;
        if (hlsFailCount <= 2 && data.type !== Hls.ErrorTypes.NETWORK_ERROR) {
          scheduleRecover();
        } else {
          switchToMp3();
        }
      }

      function onAudioError() {
        if (mode === 'hls') switchToMp3();
      }

      function switchToMp3() {
        mode = 'mp3';
        hlsFailCount = 0;
        stopUpgradeProbe();
        teardownHls();
        audio.src = MP3_STREAM;
        liveWall = Date.now() / 1000;
        attemptPlay();
        playPause.disabled = false;
        startUpgradeProbe();
      }

      function switchToHls() {
        stopUpgradeProbe();
        const wasPlaying = !audio.paused;
        teardownHls();
        setupHls();
        if (wasPlaying) goLive();
      }

      async function probeHls() {
        try {
          const res = await fetch(HLS_STREAM, { method: 'HEAD' });
          if (res.ok) switchToHls();
        } catch (_) {}
      }

      function startUpgradeProbe() {
        stopUpgradeProbe();
        upgradeTimer = setInterval(probeHls, 30000);
        setTimeout(probeHls, 5000);
      }

      function stopUpgradeProbe() {
        if (upgradeTimer) {
          clearInterval(upgradeTimer);
          upgradeTimer = null;
        }
      }

      function scheduleRecover() {
        if (recoverTimer) return;
        recoverTimer = setTimeout(() => {
          recoverTimer = null;
          if (!audio.paused && audio.readyState < 3) {
            const seekTarget = userSeeked ? audio.currentTime : null;
            teardownHls();
            setupHls();
            if (seekTarget != null) {
              hls.once(Hls.Events.MANIFEST_PARSED, () => {
                hls.startPosition = seekTarget;
                audio.currentTime = seekTarget;
                audio.play().catch(() => {});
              });
            } else {
              goLive();
            }
          }
        }, 15000);
      }

      let unmuted = false;
      function attemptPlay() {
        if (!unmuted) audio.muted = true;
        audio.play().catch(() => {});
        if (!unmuted) {
          const unmute = () => {
            if (unmuted) return;
            unmuted = true;
            audio.muted = false;
            audio.play().catch(() => {});
            document.removeEventListener('click', unmute);
            document.removeEventListener('touchstart', unmute);
          };
          document.addEventListener('click', unmute);
          document.addEventListener('touchstart', unmute);
        }
      }

      function onReady() {
        playPause.disabled = false;
        hlsFailCount = 0;
        const p = loadPosition();
        if (p && p.t && Date.now() - p.ts < 3600000 && audio.seekable.length && p.t >= audio.seekable.start(0) && p.t <= audio.seekable.end(audio.seekable.length - 1)) {
          audio.currentTime = p.t;
          userSeeked = true;
          lastUserPos = p.t;
        }
        attemptPlay();
      }

      function trueEdgeMedia() {
        if (mode === 'mp3') return audio.currentTime;
        if (audio.seekable.length) return audio.seekable.end(audio.seekable.length - 1);
        return 0;
      }

      function syncPosition() {
        if (mode === 'mp3') return audio.currentTime;
        if (hls && hls.liveSyncPosition) return hls.liveSyncPosition;
        return trueEdgeMedia();
      }

      function mediaToWall(mediaTime) {
        if (mode === 'mp3') return Date.now() / 1000;
        const edge = trueEdgeMedia();
        if (edge > 0) return liveWall - (edge - mediaTime);
        return Date.now() / 1000;
      }

      function findSongAt(wc) {
        const exact = timeline.find((s) => wc >= s.played_at && wc < s.played_at + s.duration);
        if (exact) return exact;
        let fallback = null;
        for (const s of timeline) {
          if (s.played_at <= wc && (!fallback || s.played_at > fallback.played_at)) fallback = s;
        }
        return fallback;
      }

      function isAtLive() {
        if (mode === 'mp3') return true;
        const target = syncPosition();
        return Math.abs(target - audio.currentTime) < 5;
      }

      function setArt(url) {
        if (url === currentArt) return;
        currentArt = url || '';
        if (url) {
          disc.style.backgroundImage = `url("${url}")`;
          disc.classList.add('has-art');
        } else {
          disc.style.backgroundImage = '';
          disc.classList.remove('has-art');
        }
      }

      function loadPosition() {
        const m = document.cookie.match(/(?:^|; )tj_pos=([^;]*)/);
        if (!m) return null;
        try { return JSON.parse(decodeURIComponent(m[1])); } catch { return null; }
      }

      function fmt(s) {
        s = Math.max(0, s | 0);
        const m = (s / 60) | 0;
        const r = s % 60;
        return m + ':' + String(r).padStart(2, '0');
      }

      function render() {
        const live = isOnline || audioPlaying;
        if (!live) {
          setArt(null);
          songText.textContent = 'Ingen sändning';
          artistEl.textContent = '';
          progressFill.style.width = '0%';
          timeLabel.textContent = '';
          liveBtn.classList.remove('live');
          fetchNow();
          return;
        }

        if (!isOnline && nextUp) {
          if (nextUp.id !== localSongId) {
            localSongId = nextUp.id;
            localStart = Date.now() / 1000;
          }
          setArt(nextUp.art);
          songText.textContent = nextUp.title || nextUp.text;
          artistEl.textContent = nextUp.artist || '';
          const pos = Math.max(0, Date.now() / 1000 - localStart);
          const dur = nextUp.duration || 0;
          const pct = dur ? Math.min(100, (pos / dur) * 100) : 0;
          progressFill.style.width = pct + '%';
          timeLabel.textContent = dur ? fmt(pos) + ' / ' + fmt(dur) : '';
          liveBtn.classList.toggle('live', isAtLive());
          return;
        }

        const wc = mediaToWall(audio.currentTime);
        let song = nowPlayingSong;
        if (song) {
          const pos = wc - song.played_at;
          if (pos >= song.duration) {
            // API lagging — song should have ended, check timeline
            song = findSongAt(wc) || song;
          }
        } else {
          song = findSongAt(wc);
        }
        if (song) {
          setArt(song.art);
          songText.textContent = song.title || song.text;
          artistEl.textContent = song.artist || '';
          const pos = Math.min(song.duration, Math.max(0, wc - song.played_at));
          const pct = song.duration ? Math.min(100, (pos / song.duration) * 100) : 0;
          progressFill.style.width = pct + '%';
          timeLabel.textContent = fmt(pos) + ' / ' + fmt(song.duration);
        } else {
          setArt(null);
          songText.textContent = 'TjenaMors Radio';
          artistEl.textContent = 'Vi spelar bra skit!';
          progressFill.style.width = '0%';
          timeLabel.textContent = '';
          fetchNow();
        }

        liveBtn.classList.toggle('live', isAtLive());
      }

      playPause.addEventListener('click', () => {
        if (audio.paused) {
          if (!userSeeked && (isAtLive() || !audio.seekable.length)) goLive();
          audio.play().catch((e) => console.error(e));
        } else {
          audio.pause();
        }
      });

      liveBtn.addEventListener('click', goLive);

      function goLive() {
        userSeeked = false;
        if (mode === 'mp3') {
          liveWall = Date.now() / 1000;
          audio.play().catch(() => {});
          return;
        }
        const live = syncPosition();
        if (live) audio.currentTime = live;
        liveWall = Date.now() / 1000;
        audio.play().catch(() => {});
      }

      audio.addEventListener('timeupdate', () => {
        audioPlaying = true;
        if (userSeeked && !isAtLive()) lastUserPos = audio.currentTime;
        render();
      });
      audio.addEventListener('seeking', () => {
        if (suppressSeekGuard || scrubbing) return;
        if (userSeeked) {
          const live = syncPosition();
          if (live && Math.abs(audio.currentTime - live) < 5) {
            suppressSeekGuard = true;
            audio.currentTime = lastUserPos;
            setTimeout(() => { suppressSeekGuard = false; }, 200);
          }
        }
      });
      audio.addEventListener('play', () => {
        audioPlaying = true;
        playPause.textContent = '❚❚';
      });
      audio.addEventListener('pause', () => {
        audioPlaying = false;
        playPause.textContent = '▶';
        render();
      });
      audio.addEventListener('waiting', () => {
        if (!audio.paused && mode === 'hls' && !scrubbing) scheduleRecover();
      });

      let saveTimer = 0;
      setInterval(() => {
        liveWall = Date.now() / 1000;
        render();
        const now = Date.now();
        if (now - saveTimer >= 5000) {
          saveTimer = now;
          const t = audio.currentTime;
          if (t && !isNaN(t)) {
            document.cookie = 'tj_pos=' + encodeURIComponent(JSON.stringify({ t: Math.round(t * 10) / 10, ts: now })) + '; path=/; max-age=86400';
          }
        }
      }, 1000);

      const cityEl = document.querySelector('.city');
      const sunEl = document.querySelector('.city > .sun');
      const playerEl = document.querySelector('.player');

      function alignPlayerToSun() {
        if (!sunEl || !playerEl) return;
        const s = sunEl.getBoundingClientRect();
        const cx = s.left + s.width / 2;
        const cy = s.top + s.height / 2;
        const cont = playerEl.offsetParent;
        const cRect = cont.getBoundingClientRect();
        const discH = disc.getBoundingClientRect().height;
        playerEl.style.left = cx - cRect.left + 'px';
        playerEl.style.top = cy - cRect.top + 'px';
        playerEl.style.transform = `translate(-50%, ${-discH / 2}px)`;
      }

      function revealPlayer() {
        alignPlayerToSun();
        playerEl.classList.add('visible');
      }

      cityEl.addEventListener('animationend', (e) => {
        if (e.animationName === 'rising_city') revealPlayer();
      });
      setTimeout(revealPlayer, 1200);
      window.addEventListener('resize', () => {
        if (playerEl.classList.contains('visible')) alignPlayerToSun();
      });

      pollNowPlaying();
      setInterval(pollNowPlaying, 2000);
      setupHls();
      render();

      const grid = document.querySelector('.synth-grid');
      const gridContainer = document.querySelector('.grid-container');
      setTimeout(() => {
        grid.style.animationPlayState = 'paused';
        gridContainer.style.opacity = '0';
      }, 5000);

      window.addEventListener('beforeunload', () => {
        const t = audio.currentTime;
        if (t && !isNaN(t)) {
          document.cookie = 'tj_pos=' + encodeURIComponent(JSON.stringify({ t: Math.round(t * 10) / 10, ts: Date.now() })) + '; path=/; max-age=86400';
        }
      });
    </script>
  </body>
</html>
